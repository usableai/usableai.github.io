# AIXLab@Chalmers roster.
# Fields:
#   slug:          identifier used for the /members/<slug> URL (if bio_link set)
#   name:          display name
#   role:          short role string shown on the card
#   group:         organizer | phd | postdoc | collaborator | alumni
#   tags:          optional list of small badges (e.g. ["Lab Lead"])
#   image:         relative path under /assets/img/
#   bio_link:      internal link to full member page (optional)
#   external_link: external homepage / Google Scholar (optional)
#   affiliation:   shown under role for collaborators (optional)

